<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Moud — Atlas</title>
<meta name="description" content="Websites and AI for local business.">
<meta name="theme-color" content="#f0ece4">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #f0ece4;
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Inter', -apple-system, sans-serif;
    color: #2c2c2c;
    -webkit-font-smoothing: antialiased;
  }

  .card-container {
    width: 100%;
    max-width: 420px;
    padding: 48px 32px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* Agency mark */
  .agency {
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #a09888;
    margin-bottom: 40px;
  }

  /* Name */
  .name {
    font-family: 'Instrument Serif', serif;
    font-size: 48px;
    font-weight: 400;
    color: #2c2c2c;
    line-height: 1.1;
    text-align: center;
  }

  /* Role */
  .role {
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 300;
    color: #8a8070;
    margin-top: 10px;
    letter-spacing: 0.5px;
  }

  /* Divider */
  .divider {
    width: 40px;
    height: 1px;
    background: #c8c0b4;
    margin: 36px 0;
  }

  /* Contact info */
  .contact {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    width: 100%;
  }

  .contact a {
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 300;
    color: #5a5247;
    text-decoration: none;
    letter-spacing: 0.3px;
    transition: color 0.2s ease;
  }

  .contact a:hover {
    color: #2c2c2c;
  }

  /* QR section */
  .qr-section {
    margin-top: 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  .qr-label {
    font-family: 'Inter', sans-serif;
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #b0a898;
  }

  .qr-box {
    background: #faf8f4;
    border-radius: 12px;
    padding: 20px;
    box-shadow: 0 1px 8px rgba(0,0,0,0.04);
  }

  .qr-box canvas {
    display: block;
  }

  /* Save button */
  .save-btn {
    margin-top: 36px;
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #faf8f4;
    background: #2c2c2c;
    border: none;
    border-radius: 50px;
    padding: 14px 36px;
    cursor: pointer;
    transition: all 0.2s ease;
    text-decoration: none;
    display: inline-block;
  }

  .save-btn:hover {
    background: #444;
    transform: translateY(-1px);
  }

  .save-btn:active {
    transform: translateY(0);
  }

  /* Footer */
  .footer {
    margin-top: 48px;
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    font-size: 13px;
    color: #c0b8a8;
  }

  /* Subtle animated entrance */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card-container > * {
    animation: fadeUp 0.6s ease-out both;
  }

  .card-container > *:nth-child(1) { animation-delay: 0.0s; }
  .card-container > *:nth-child(2) { animation-delay: 0.08s; }
  .card-container > *:nth-child(3) { animation-delay: 0.14s; }
  .card-container > *:nth-child(4) { animation-delay: 0.2s; }
  .card-container > *:nth-child(5) { animation-delay: 0.26s; }
  .card-container > *:nth-child(6) { animation-delay: 0.32s; }
  .card-container > *:nth-child(7) { animation-delay: 0.38s; }
  .card-container > *:nth-child(8) { animation-delay: 0.44s; }
</style>
</head>
<body>

<div class="card-container">
  <div class="agency">Atlas</div>

  <h1 class="name">Moud</h1>
  <p class="role">Websites & AI for local business</p>

  <div class="divider"></div>

  <div class="contact">
    <a href="tel:+14148287744">(414) 828-7744</a>
    <a href="mailto:moudisfunny@gmail.com">moudisfunny@gmail.com</a>
  </div>

  <div class="qr-section">
    <span class="qr-label">Scan to save</span>
    <div class="qr-box">
      <canvas id="qr"></canvas>
    </div>
  </div>

  <a class="save-btn" id="saveContact" href="#">Save Contact</a>

  <p class="footer">let's build something</p>
</div>

// Generate QR
var qr = new QRCode(0, 1); // auto type, L correction
qr.addData(window.location.href);
qr.make();

var canvas = document.getElementById('qr');
var size = 140;
var cellSize = size / qr.moduleCount;
canvas.width = size;
canvas.height = size;
var ctx = canvas.getContext('2d');
ctx.fillStyle = '#faf8f4';
ctx.fillRect(0, 0, size, size);

for (var row = 0; row < qr.moduleCount; row++) {
  for (var col = 0; col < qr.moduleCount; col++) {
    if (qr.modules[row][col]) {
      ctx.fillStyle = '#2c2c2c';
      ctx.fillRect(col * cellSize, row * cellSize, cellSize + 0.5, cellSize + 0.5);
    }
  }
}

// vCard download
document.getElementById('saveContact').addEventListener('click', function(ev) {
  ev.preventDefault();
  var vcard = [
    'BEGIN:VCARD',
    'VERSION:3.0',
    'FN:Moud',
    'ORG:Atlas',
    'TITLE:Websites & AI for Local Business',
    'TEL;TYPE=CELL:+14148287744',
    'EMAIL:moudisfunny@gmail.com',
    'URL:' + window.location.href,
    'END:VCARD'
  ].join('\n');
  var blob = new Blob([vcard], { type: 'text/vcard' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'Moud-Atlas.vcf';
  a.click();
  URL.revokeObjectURL(url);
});
</script>
